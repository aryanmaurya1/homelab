# Librewolf - Privacy-focused browser in container
# https://github.com/linuxserver/docker-librewolf
#
# Port: 8082 -> 3000 (Web UI)
# Default credentials: admin / admin

services:
  librewolf:
    image: lscr.io/linuxserver/librewolf:latest
    container_name: librewolf
    hostname: librewolf
    ports:
      - 8082:3000
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
      - KEEP_APP_RUNNING=1
      - CUSTOM_USER=admin
      - PASSWORD=admin
      - TITLE=Librewolf
      - NO_DECOR=true
    volumes:
      - /ctnr/data:/config
    shm_size: 1gb
    restart: always
