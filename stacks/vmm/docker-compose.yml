# Virtual Machine Manager - Web UI for libvirt/KVM
# https://github.com/m-bers/docker-virt-manager
#
# Port: 8084 -> 80
# Requires: libvirt socket and KVM device access

services:
  virt-manager:
    image: mber5/virt-manager:latest
    container_name: vmm
    hostname: vmm
    ports:
      - 8084:80
    environment:
      - DARK_MODE=false
      # Connect to local QEMU/KVM system session
      - HOSTS=['qemu:///system']
    volumes:
      - /var/run/libvirt/libvirt-sock:/var/run/libvirt/libvirt-sock
      - /var/lib/libvirt/images:/var/lib/libvirt/images
    devices:
      - /dev/kvm:/dev/kvm
    # Uncomment for Ubuntu hosts with AppArmor
    # privileged: true
    restart: always

# Remote KVM connection example:
# environment:
#   - HOSTS=['qemu+ssh://user@host1/system', 'qemu+ssh://user@host2/system']
# volumes:
#   - /home/user/.ssh/id_rsa:/root/.ssh/id_rsa:ro
