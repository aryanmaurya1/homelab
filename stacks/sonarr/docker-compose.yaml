# Sonarr - TV series management
# https://sonarr.tv/
#
# Port: 8086 -> 8989

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    ports:
      - 8086:8989
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - /ctnr/data/sonarr:/config
      - /mnt/tv:/tv
      - /mnt/downloads:/downloads
    restart: always
