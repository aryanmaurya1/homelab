# Nginx Proxy Manager - Reverse proxy with web UI
# https://nginxproxymanager.com/
#
# Ports: 80 (HTTP), 443 (HTTPS), 8080 -> 81 (Admin UI)
# Default credentials: admin@example.com / changeme

services:
  app:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginxpm
    hostname: nginxpm
    ports:
      - 80:80
      - 443:443
      - 8080:81
    volumes:
      - /root/container/nginx-proxy-manager/data:/data
      - nginx-proxy-manager:/etc/letsencrypt
    networks:
      - traefik
    restart: always

volumes:
  nginx-proxy-manager:

networks:
  traefik:
    external: true
