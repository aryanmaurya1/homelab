# Caddy - Modern web server with automatic HTTPS
# https://caddyserver.com/
#
# Ports: 80 (HTTP), 443 (HTTPS/TCP+UDP)

services:
  caddy:
    image: docker.io/caddy:latest
    container_name: caddy
    hostname: caddy
    cap_add:
      - NET_ADMIN
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - /root/container/caddy/config/Caddyfile:/etc/caddy/Caddyfile
      - /root/container/caddy/config/site:/srv
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - traefik
    restart: always

volumes:
  caddy_data:
  caddy_config:

networks:
  traefik:
    external: true
