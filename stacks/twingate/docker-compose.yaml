# Twingate - Zero trust network access connector
# https://www.twingate.com/
#
# No exposed ports (outbound connection only)
# Requires: TWINGATE_ACCESS_TOKEN, TWINGATE_REFRESH_TOKEN

services:
  twingate-connector:
    image: twingate/connector:1
    container_name: twingate-connector
    hostname: twingate-connector
    pull_policy: always
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    environment:
      TWINGATE_NETWORK: "rynm"
      TWINGATE_ACCESS_TOKEN: "${TWINGATE_ACCESS_TOKEN}"
      TWINGATE_REFRESH_TOKEN: "${TWINGATE_REFRESH_TOKEN}"
      TWINGATE_LABEL_HOSTNAME: "${HOSTNAME}"
      TWINGATE_LABEL_DEPLOYED_BY: "docker"
    restart: unless-stopped