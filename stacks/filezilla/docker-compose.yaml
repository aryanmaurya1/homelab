# FileZilla - FTP client in browser
# https://github.com/jlesage/docker-filezilla
#
# Port: 5800 (Web UI)
# Default credentials: admin / admin

services:
  filezilla:
    image: jlesage/filezilla
    container_name: filezilla
    hostname: filezilla
    ports:
      - 5800:5800
    environment:
      - TZ=Asia/Kolkata
      - KEEP_APP_RUNNING=1
      - SECURE_CONNECTION=1
      - WEB_AUDIO=1
      - WEB_AUTHENTICATION=1
      - WEB_AUTHENTICATION_USERNAME=admin
      - WEB_AUTHENTICATION_PASSWORD=admin
    volumes:
      - /mnt/drive/filezilla:/config:rw
      - /mnt/drive:/storage:rw
    restart: always
