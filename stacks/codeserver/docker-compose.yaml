# Code-Server - VS Code in the browser
# https://github.com/coder/code-server
#
# Port: 8094 -> 8080
# Default credentials: None (set PASSWORD env var to enable)

services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    hostname: code-server
    user: "0:0"
    ports:
      - 8094:8080
    environment:
      - DOCKER_USER=${USER}
    volumes:
      - /root/container/codeserver/data/.local:/home/coder/.local
      - /root/container/codeserver/data/.config:/home/coder/.config
      - /mnt/drive/cloud/kdev:/home/coder/project
    networks:
      - traefik
    restart: always

networks:
  traefik:
    external: true
