apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firefox-config-pvc
  namespace: ctnr
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefox-linuxserver
  namespace: ctnr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firefox
  template:
    metadata:
      labels:
        app: firefox
    spec:
      containers:
        - name: firefox
          image: lscr.io/linuxserver/firefox:latest
          ports:
            - containerPort: 3000
            - containerPort: 3001
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          volumeMounts:
            - name: firefox-config
              mountPath: /config
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: firefox-config
          persistentVolumeClaim:
            claimName: firefox-config-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: firefox-linuxserver
  namespace: ctnr
spec:
  selector:
    app: firefox
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: http-alt
      port: 3001
      targetPort: 3001
