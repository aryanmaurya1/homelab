apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
# PersistentVolumeClaim for registry image storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
# TLS certificate for the registry (self-signed).
# Regenerate with: openssl req -x509 -newkey rsa:4096 -keyout tls.key -out tls.crt
#   -days 3650 -nodes -subj "/CN=uno.lab.local" -addext "subjectAltName=DNS:uno.lab.local"
apiVersion: v1
kind: Secret
metadata:
  name: registry-tls
  namespace: registry
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
# Registry configuration with TLS, CORS, and storage settings.
# The registry requires HTTPS because TLS is configured here.
# CORS headers allow the registry-ui to make same-origin proxy calls.
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-config
  namespace: registry
data:
  config.yml: |
    version: 0.1
    log:
      level: info
    http:
      addr: :5000
      tls:
        certificate: /etc/ssl/registry/tls.crt
        key: /etc/ssl/registry/tls.key
      headers:
        Access-Control-Allow-Origin: ['http://uno.lab.local:30501']
        Access-Control-Allow-Methods: ['GET', 'HEAD', 'PUT', 'POST', 'DELETE']
        Access-Control-Allow-Headers: ['Authorization', 'Accept', 'Content-Type']
        Access-Control-Max-Age: [1728000]
        Access-Control-Allow-Credentials: [true]
    storage:
      delete:
        enabled: true
      filesystem:
        rootdirectory: /var/lib/registry
---
# Custom nginx config for registry-ui that proxies /v2 requests to the registry.
# The registry uses HTTPS with a self-signed cert, so proxy_ssl_verify is disabled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-ui-nginx-config
  namespace: registry
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;

        client_max_body_size 0;
        client_body_buffer_size     32k;
        client_header_buffer_size   8k;
        large_client_header_buffers 8 64k;

        chunked_transfer_encoding on;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_ignore_headers "X-Accel-Buffering";

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        location /v2 {
            if ($http_user_agent ~ "^(docker\/1\.(3|4|5(?!\.[0-9]-dev))|Go ).*$" ) {
                return 404;
            }
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
            proxy_pass https://registry:5000;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
---
# Docker Registry v2 — serves as a private container image registry.
# Mounts:
#   - config:  registry config.yml (TLS, CORS, storage)
#   - tls:     self-signed TLS cert (read-only)
#   - data:    persistent volume for images
#
# Accessible externally via NodePort 30500.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
              name: http
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          volumeMounts:
            - mountPath: /etc/docker/registry
              name: config
            - mountPath: /var/lib/registry
              name: data
            - mountPath: /etc/ssl/registry
              name: tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: registry-config
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
        - name: tls
          secret:
            secretName: registry-tls
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  selector:
    app: registry
  ports:
    - nodePort: 30500
      port: 5000
      targetPort: 5000
      name: http
  type: NodePort
---
# Registry-UI — web frontend for browsing the private registry.
#
# REGISTRY_URL is set to empty so the JavaScript frontend makes same-origin
# API calls (to the nginx that serves it). Those /v2 requests are then proxied
# by nginx (via the custom default.conf) to the registry service internally.
# This avoids the browser having to connect directly to the HTTPS-only registry
# NodePort, which would fail due to the self-signed TLS cert.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-ui
  namespace: registry
  labels:
    app: registry-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-ui
  template:
    metadata:
      labels:
        app: registry-ui
    spec:
      containers:
        - name: ui
          image: joxit/docker-registry-ui:latest
          ports:
            - containerPort: 80
              name: http
          env:
            - name: REGISTRY_TITLE
              value: "Private Registry"
            - name: REGISTRY_URL
              value: ""
            - name: SINGLE_REGISTRY
              value: "true"
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          volumeMounts:
            - mountPath: /etc/nginx/conf.d/default.conf
              name: nginx-config
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: registry-ui-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: registry-ui
  namespace: registry
spec:
  selector:
    app: registry-ui
  ports:
    - nodePort: 30501
      port: 80
      targetPort: http
      name: http
  type: NodePort
